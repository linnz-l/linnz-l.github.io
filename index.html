<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        :root { --bg-color: #f5f3ef; --card-bg: #ffffff; --text-main: #3a3530; --text-muted: #7a7570; --forest-dark: #1e3f20; --forest-light: #3b6e4c; --forest-gradient: linear-gradient(135deg, #1e3f20 0%, #3b6e4c 100%); --sea-color: #2a6f97; --border-radius: 16px; --shadow: 0 10px 25px rgba(58, 53, 48, 0.04); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        nav { display: flex; justify-content: flex-end; gap: 20px; margin-bottom: 20px; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--forest-light); font-weight: 600; }
        header { background: var(--forest-gradient); color: #f5f3ef; padding: 40px; border-radius: var(--border-radius); box-shadow: 0 15px 35px rgba(30, 63, 32, 0.15); margin-bottom: 30px; position: relative; overflow: hidden; }
        header::after { content: ""; position: absolute; top: -60%; right: -20%; width: 350px; height: 350px; background: radial-gradient(circle, rgba(245, 243, 239, 0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }
        header h1 { font-size: 2.2rem; margin-bottom: 10px; color: #ffffff; }
        .tagline { font-size: 1.1rem; opacity: 0.9; margin-bottom: 20px; color: #d1e2d3; }
        .bio { font-size: 1rem; background: rgba(255, 255, 255, 0.08); padding: 15px 20px; border-radius: 8px; border-left: 4px solid #a3c4bc; }
        .main-content { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 30px; border: 1px solid rgba(210, 205, 195, 0.3); }
        h2 { font-size: 1.3rem; margin-bottom: 20px; color: var(--forest-dark); position: relative; padding-left: 14px; }
        h2::before { content: ""; position: absolute; left: 0; top: 4px; width: 4px; height: 18px; background: var(--sea-color); border-radius: 2px; }
        .more-link { font-size: 0.85rem; color: var(--sea-color); float: right; text-decoration: none; font-weight: 500; }
        .preview-item { margin-bottom: 15px; padding-left: 12px; border-left: 2px solid #e8e5e0; }
        .preview-label { font-size: 0.85rem; color: var(--sea-color); font-weight: 600; }
        .preview-title { font-weight: 600; font-size: 1rem; }
        .tool-tag { display: inline-block; background: #eef4f0; color: var(--forest-light); padding: 5px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; text-decoration: none; margin: 0 5px 10px 0; }
        .thought-box { background: #fbfbfa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #edebe6; font-size: 0.95rem; }
        .thought-time { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        footer { text-align: center; margin-top: 40px; font-size: 0.85rem; color: var(--text-muted); }
        .loading { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="index.html" class="active">首页</a>
        <a href="explore.html">探索足迹</a>
        <a href="blog.html">碎碎念</a>
        <a href="toolkit.html">Toolkit</a>
    </nav>
    <header>
        <h1>你好，我是 你的名字 👋</h1>
        <div class="tagline">正在探索世界的终身学习者 / 自由记录者</div>
        <div class="bio">欢迎来到我的数字温室。本网页完全自动化运行，我只需更新纯文本，数据便会流向大地的各个角落。</div>
    </header>
    <div class="main-content">
        <div class="left-col">
            <div class="card">
                <h2>🧭 探索足迹 <a href="explore.html" class="more-link">全部足迹 →</a></h2>
                <div id="explore-preview" class="loading">正在加载最新足迹...</div>
            </div>
            <div class="card">
                <h2>🛠️ 我的 Toolkit <a href="toolkit.html" class="more-link">进入仓库 →</a></h2>
                <div id="toolkit-preview" class="loading">正在加载工具背包...</div>
            </div>
        </div>
        <div class="right-col">
            <div class="card" style="height: 100%;">
                <h2>💬 随笔碎碎念 <a href="blog.html" class="more-link">查看全部 →</a></h2>
                <div id="thoughts-preview" class="loading">正在加载碎碎念...</div>
            </div>
        </div>
    </div>
    <footer><p>© 2026 你的名字. Data dynamic loaded by Web Automation.</p></footer>
</div>

<script>
    // 异步读取并渲染首页内容
    async function loadPreview(file, elementId, type) {
        try {
            const response = await fetch(file);
            const text = await response.text();
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            
            // 首页只预览前 3 条数据
            const previewLines = lines.slice(0, 3);
            
            previewLines.forEach(line => {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length >= 2) {
                    if (type === 'explore') {
                        container.innerHTML += `<div class="preview-item"><div class="preview-label">📍 ${parts[0]}</div><div class="preview-title">${parts[1]}</div></div>`;
                    } else if (type === 'toolkit') {
                        container.innerHTML += `<a href="toolkit.html" class="tool-tag">⚙️ ${parts[0]}</a>`;
                    } else if (type === 'thoughts') {
                        // 截取前面一部分内容防止首页被撑开
                        const shortContent = parts[2].length > 50 ? parts[2].substring(0, 50) + '...' : parts[2];
                        container.innerHTML += `<div class="thought-box"><div class="thought-time">📅 ${parts[0]} · ${parts[1]}</div><div>${shortContent}</div></div>`;
                    }
                }
            });
        } catch (e) {
            document.getElementById(elementId).innerText = '暂无数据或读取失败。';
        }
    }
    // 触发读取
    loadPreview('explore.txt', 'explore-preview', 'explore');
    loadPreview('toolkit.txt', 'toolkit-preview', 'toolkit');
    loadPreview('thoughts.txt', 'thoughts-preview', 'thoughts');
</script>
</body>
</html>
