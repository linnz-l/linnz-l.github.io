<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索足迹</title>
    <style>
        :root { --bg-color: #f5f3ef; --card-bg: #ffffff; --text-main: #3a3530; --text-muted: #7a7570; --forest-dark: #1e3f20; --sea-color: #2a6f97; --border-radius: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-block; color: var(--sea-color); text-decoration: none; font-size: 0.95rem; font-weight: 600; margin-bottom: 25px; }
        h1 { font-size: 1.8rem; color: var(--forest-dark); margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .explore-card { background: var(--card-bg); padding: 25px; border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(58, 53, 48, 0.04); border: 1px solid rgba(210, 205, 195, 0.3); margin-bottom: 25px; }
        .card-title { font-size: 1.15rem; color: var(--forest-dark); margin-bottom: 15px; font-weight: 600; border-bottom: 2px solid #edebe6; padding-bottom: 6px; }
        .item { margin-bottom: 15px; }
        .item-name { font-weight: 600; font-size: 0.98rem; margin: 2px 0; }
        .item-desc { font-size: 0.88rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回主页</a>
        <h1>🧭 大地足迹 · 广泛探索</h1>
        <div id="explore-grid" class="grid">正在读取足迹...</div>
    </div>
    <script>
        async function loadExplore() {
            try {
                const response = await fetch('explore.txt');
                const text = await response.text();
                const lines = text.split('\n').filter(line => line.trim() !== '');
                const grid = document.getElementById('explore-grid');
                grid.innerHTML = '';
                
                let categories = {};
                lines.forEach(line => {
                    const parts = line.split('|').map(p => p.trim());
                    if(parts.length >= 3){
                        if(!categories[parts[0]]) categories[parts[0]] = [];
                        categories[parts[0]].push({name: parts[1], desc: parts[2]});
                    }
                });

                for (let cat in categories) {
                    let cardHtml = `<div class="explore-card"><div class="card-title">✨ ${cat}</div>`;
                    categories[cat].forEach(item => {
                        cardHtml += `<div class="item"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div></div>`;
                    });
                    cardHtml += `</div>`;
                    grid.innerHTML += cardHtml;
                }
            } catch(e) { grid.innerText = '加载失败。'; }
        }
        loadExplore();
    </script>
</body>
</html>
